<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Зубы</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Nunito', -apple-system, sans-serif;
  background: #08101f;
  color: #fff;
  -webkit-font-smoothing: antialiased;
}

.bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(72px);
  animation: drift linear infinite;
  opacity: 0.6;
}

.o1 { width:320px;height:320px;background:radial-gradient(circle,#1a5fff,#0a2fa0 60%,transparent);top:-60px;left:-40px;animation-duration:20s; }
.o2 { width:260px;height:260px;background:radial-gradient(circle,#7c3aed,#4c1d95 60%,transparent);top:28%;right:-70px;animation-duration:26s;animation-delay:-8s; }
.o3 { width:200px;height:200px;background:radial-gradient(circle,#0ea5e9,#0369a1 60%,transparent);bottom:22%;left:8%;animation-duration:17s;animation-delay:-4s; }
.o4 { width:170px;height:170px;background:radial-gradient(circle,#6366f1,#3730a3 60%,transparent);bottom:-30px;right:18%;animation-duration:30s;animation-delay:-14s; }

.tooth-silhouette {
  position:absolute;
  width:520px;
  height:auto;
  bottom:-60px;
  right:-80px;
  opacity:0.04;
  filter:blur(18px);
  pointer-events:none;
  transform:rotate(12deg);
}

@keyframes drift {
  0%   { transform:translate(0,0) scale(1); }
  33%  { transform:translate(28px,18px) scale(1.07); }
  66%  { transform:translate(-18px,32px) scale(0.95); }
  100% { transform:translate(0,0) scale(1); }
}

.app {
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100%;height:-webkit-fill-available;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);
}

/* Glass utility */
.gl {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),inset 0 -1px 0 rgba(0,0,0,0.12),0 8px 28px rgba(0,0,0,0.3);
}

/* Header */
.hdr {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 8px;
}

.hdr-title {
  font-size:19px;font-weight:900;letter-spacing:-0.3px;
  background:linear-gradient(135deg,#fff 20%,rgba(147,197,253,0.9) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.phase-pill {
  font-size:10px;font-weight:700;padding:5px 11px;border-radius:20px;
  max-width:148px;text-align:center;line-height:1.3;
}

/* Age panel */
.age-panel {
  margin:0 13px 11px;border-radius:20px;padding:13px 16px;
}

.age-row {
  display:flex;align-items:center;gap:13px;
}

.age-num {
  font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1;
  white-space:nowrap;min-width:82px;
  background:linear-gradient(135deg,#fff 30%,#7dd3fc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.age-num small { font-size:13px;font-weight:400;opacity:0.6; }

.sl-col { flex:1; }

.slider {
  -webkit-appearance:none;width:100%;height:5px;border-radius:3px;
  outline:none;cursor:pointer;
  background:rgba(255,255,255,0.14);
}

.slider::-webkit-slider-thumb {
  -webkit-appearance:none;width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,0.94);border:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.3),0 0 0 3px rgba(120,180,255,0.45),inset 0 1px 0 rgba(255,255,255,0.9);
  cursor:pointer;
}

.sl-ticks {
  position:relative;height:14px;margin-top:5px;
  font-size:9px;color:rgba(255,255,255,0.38);font-weight:700;letter-spacing:0.2px;
}

/* Jaw area */
.jaw-area {
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2px 8px;overflow:hidden;gap:1px;
}

.jaw-lbl {
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:rgba(255,255,255,0.35);font-weight:700;margin-bottom:3px;
}

.jaw-row {
  display:flex;gap:2px;align-items:flex-end;justify-content:center;
}
.jaw-row.lower { align-items:flex-start; }

.midline {
  display:flex;align-items:center;gap:8px;
  width:100%;max-width:340px;margin:4px 0;
}
.ml-line { flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),rgba(255,255,255,0.22),transparent); }
.ml-txt  { font-size:8px;color:rgba(255,255,255,0.28);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap; }

/* Tooth */
.tooth {
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;position:relative;
  transition:transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
}
.tooth.lower { flex-direction:column-reverse; }
.tooth:active { transform:scale(1.18);z-index:20; }

.tooth-body {
  border-radius:8px 8px 3px 3px;position:relative;
  overflow:hidden;transition:all 0.3s ease;
}

.tooth-body::before {
  content:'';position:absolute;top:0;left:0;right:0;height:44%;
  background:linear-gradient(to bottom,rgba(255,255,255,0.32),rgba(255,255,255,0.04));
  border-radius:6px 6px 0 0;pointer-events:none;z-index:2;
}

.tooth.lower .tooth-body { border-radius:3px 3px 8px 8px; }
.tooth.lower .tooth-body::before {
  top:auto;bottom:0;height:40%;
  background:linear-gradient(to top,rgba(255,255,255,0.22),rgba(255,255,255,0.02));
  border-radius:0 0 6px 6px;
}

.tooth-root { width:52%;height:9px;border-radius:0 0 5px 5px;opacity:0.5;transition:background 0.3s; }
.tooth.lower .tooth-root { border-radius:5px 5px 0 0; }

.tooth-num { font-size:8px;color:rgba(255,255,255,0.28);font-weight:700;margin-top:2px; }
.tooth.lower .tooth-num { margin-top:0;margin-bottom:2px;order:10; }

/* Status colors */
.s-missing .tooth-body {
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);
}
.s-missing .tooth-body::before { display:none; }
.s-missing .tooth-root { background:rgba(255,255,255,0.04); }
.s-missing .tooth-num  { color:rgba(255,255,255,0.12); }

.s-baby .tooth-body {
  background:linear-gradient(160deg,#4ade80,#16a34a);
  border:1px solid rgba(74,222,128,0.35);
  box-shadow:0 3px 12px rgba(22,163,74,0.4),inset 0 1px 0 rgba(255,255,255,0.22);
}
.s-baby .tooth-root { background:#15803d; }

.s-erupting .tooth-body {
  background:linear-gradient(160deg,#86efac,#22c55e);
  border:1px solid rgba(134,239,172,0.45);
  box-shadow:0 0 0 0 rgba(74,222,128,0.65),0 3px 12px rgba(34,197,94,0.45),inset 0 1px 0 rgba(255,255,255,0.28);
  animation:pg 1.3s ease-in-out infinite;
}
.s-erupting .tooth-root { background:#16a34a; }

.s-soon-fall .tooth-body {
  background:linear-gradient(160deg,#fde68a,#f59e0b);
  border:1px solid rgba(253,230,138,0.35);
  box-shadow:0 3px 12px rgba(245,158,11,0.38),inset 0 1px 0 rgba(255,255,255,0.22);
}
.s-soon-fall .tooth-root { background:#b45309; }

.s-falling .tooth-body {
  background:linear-gradient(160deg,#fdba74,#f97316);
  border:1px solid rgba(253,186,116,0.35);
  box-shadow:0 3px 12px rgba(249,115,22,0.42),inset 0 1px 0 rgba(255,255,255,0.22);
  animation:wobble 1.8s ease-in-out infinite;
}
.s-falling .tooth-root { background:#c2410c; }

.s-fallen .tooth-body {
  background:linear-gradient(160deg,rgba(252,165,165,0.45),rgba(248,113,113,0.3));
  border:1px solid rgba(252,165,165,0.18);opacity:0.5;
}
.s-fallen .tooth-body::before { opacity:0.25; }
.s-fallen .tooth-root { background:rgba(185,28,28,0.35); }

.s-perm-new .tooth-body {
  background:linear-gradient(160deg,#1d4ed8,#1e3a8a);
  border:1px solid rgba(29,78,216,0.7);
  box-shadow:0 0 0 0 rgba(29,78,216,0.8),0 3px 14px rgba(30,58,138,0.7),inset 0 1px 0 rgba(255,255,255,0.2);
  animation:pb 1.6s ease-in-out infinite;
}
.s-perm-new .tooth-root { background:#1e3a8a; }

.s-permanent .tooth-body {
  background:linear-gradient(160deg,#bfdbfe,#60a5fa);
  border:1px solid rgba(191,219,254,0.35);
  box-shadow:0 3px 12px rgba(96,165,250,0.32),inset 0 1px 0 rgba(255,255,255,0.25);
}
.s-permanent .tooth-root { background:#2563eb; }

@keyframes pg {
  0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0.65),0 3px 12px rgba(34,197,94,0.45),inset 0 1px 0 rgba(255,255,255,0.28);}
  50%{box-shadow:0 0 0 6px rgba(74,222,128,0),0 3px 12px rgba(34,197,94,0.45),inset 0 1px 0 rgba(255,255,255,0.28);}
}
@keyframes pb {
  0%,100%{box-shadow:0 0 0 0 rgba(29,78,216,0.8),0 3px 14px rgba(30,58,138,0.7),inset 0 1px 0 rgba(255,255,255,0.2);}
  50%{box-shadow:0 0 0 7px rgba(29,78,216,0),0 3px 14px rgba(30,58,138,0.7),inset 0 1px 0 rgba(255,255,255,0.2);}
}
@keyframes wobble {
  0%,100%{transform:rotate(0deg);}
  25%{transform:rotate(-4deg);}
  75%{transform:rotate(4deg);}
}

/* Info row */
.info-row {
  display:flex;gap:8px;padding:0 13px 10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.info-row::-webkit-scrollbar { display:none; }

.icard {
  border-radius:16px;padding:10px 13px;min-width:128px;flex-shrink:0;
}

.icard-lbl { font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:5px; }
.icard-body { font-size:12px;line-height:1.6;color:rgba(255,255,255,0.82); }

/* Bottom sheet */
.sbg {
  position:fixed;inset:0;background:rgba(0,0,0,0.38);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity 0.22s;
}
.sbg.open { opacity:1;pointer-events:all; }

.sheet {
  position:fixed;bottom:0;left:0;right:0;
  border-radius:28px 28px 0 0;
  padding:10px 20px 28px;
  padding-bottom:max(28px,env(safe-area-inset-bottom));
  z-index:51;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  background:rgba(8,16,35,0.78);
  backdrop-filter:blur(48px) saturate(200%);
  -webkit-backdrop-filter:blur(48px) saturate(200%);
  border-top:1px solid rgba(255,255,255,0.16);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),0 -16px 60px rgba(0,0,0,0.55);
}
.sheet.open { transform:translateY(0); }

.sh-handle { width:38px;height:4px;background:rgba(255,255,255,0.22);border-radius:2px;margin:0 auto 16px; }
.sh-name { font-size:21px;font-weight:900;letter-spacing:-0.3px;margin-bottom:2px; }
.sh-type { font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:16px;font-weight:600;text-transform:uppercase;letter-spacing:1px; }

.sh-rows { display:flex;flex-direction:column;gap:8px;margin-bottom:16px; }

.sh-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 13px;border-radius:12px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.09);
}
.sh-key { font-size:13px;color:rgba(255,255,255,0.45);font-weight:600; }
.sh-val { font-size:13px;font-weight:800; }

.sh-status {
  padding:11px 14px;border-radius:15px;
  font-size:14px;font-weight:800;text-align:center;letter-spacing:-0.2px;
}

/* Legend */
.lbtn {
  position:fixed;
  bottom:max(18px,env(safe-area-inset-bottom));right:15px;
  width:44px;height:44px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:40;
  font-size:17px;font-weight:800;color:rgba(255,255,255,0.65);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 4px 18px rgba(0,0,0,0.38),inset 0 1px 0 rgba(255,255,255,0.18);
}

.lpanel {
  position:fixed;
  bottom:max(72px,calc(env(safe-area-inset-bottom) + 52px));right:15px;
  border-radius:18px;padding:13px 15px;z-index:40;display:none;min-width:208px;
  background:rgba(8,16,35,0.88);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(255,255,255,0.16);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.18),0 14px 44px rgba(0,0,0,0.55);
}
.lpanel.open { display:block; }

.ltitle { font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.3);margin-bottom:9px; }

.litem { display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:7px;color:rgba(255,255,255,0.78); }
.litem:last-child { margin-bottom:0; }
.ldot { width:13px;height:13px;border-radius:4px;flex-shrink:0; }
</style>
</head>

  {id:'l4',name:'Первый премоляр',babyName:'Первый молочный моляр',type:'premolar',baby:true,eruptMin:15,eruptMax:21,shedMin:108,shedMax:120,permMin:108,permMax:132},
  {id:'l3',name:'Клык',babyName:'Молочный клык',type:'canine',baby:true,eruptMin:17,eruptMax:23,shedMin:108,shedMax:120,permMin:108,permMax:132},
  {id:'l2',name:'Боковой резец',babyName:'Молочный боковой резец',type:'incisor',baby:true,eruptMin:10,eruptMax:16,shedMin:84,shedMax:96,permMin:84,permMax:96},
  {id:'l1',name:'Центральный резец',babyName:'Молочный центральный резец',type:'incisor',baby:true,eruptMin:6,eruptMax:10,shedMin:72,shedMax:84,permMin:72,permMax:84},
];
// Full arches: left quadrant (8→1) + right quadrant (1→8)
const TU=[...QU, ...[...QU].reverse()];
const TL=[...QL, ...[...QL].reverse()];

function sz(type){
  const w=window.innerWidth,s=w<370?.74:w<414?.85:1;
  const b={incisor:[22,32],canine:[21,38],premolar:[24,34],molar:[30,30],wisdom:[30,28]};
  const [bw,bh]=b[type]||[27,37];
  return{w:Math.round(bw*s),h:Math.round(bh*s)};
}

function status(t,age){
  if(!t.baby){
    if(age<t.permMin-3)return'missing';
    if(age<t.permMax+4)return'perm-new';
    return'permanent';
  }
  if(age<t.eruptMin-1)return'missing';
  if(age<t.eruptMax+2)return'erupting';
  if(age<t.shedMin-10)return'baby';
  if(age<t.shedMin-2)return'soon-fall';
  if(age<t.shedMax)return'falling';
  if(age<Math.max(t.permMin, t.shedMax+4))return'fallen';
  if(age<t.permMax+6)return'perm-new';
  return'permanent';
}

const SL={missing:'Ещё не прорезался',erupting:'🟢 Прорезается сейчас!',baby:'Молочный зуб','soon-fall':'🟡 Скоро начнёт шататься',falling:'🟠 Шатается / выпадает',fallen:'🔴 Выпал — ждём постоянный','perm-new':'🔵 Прорезается постоянный',permanent:'Постоянный зуб'};
const SC={missing:'#555',erupting:'#22c55e',baby:'#16a34a','soon-fall':'#f59e0b',falling:'#f97316',fallen:'#ef4444','perm-new':'#3b82f6',permanent:'#60a5fa'};
const SB={missing:'rgba(255,255,255,0.04)',erupting:'rgba(34,197,94,0.14)',baby:'rgba(22,163,74,0.11)','soon-fall':'rgba(245,158,11,0.14)',falling:'rgba(249,115,22,0.14)',fallen:'rgba(239,68,68,0.11)','perm-new':'rgba(59,130,246,0.17)',permanent:'rgba(96,165,250,0.11)'};

const fmt=m=>m<12?m+'м':(m%12?Math.floor(m/12)+'г '+m%12+'м':Math.floor(m/12)+'г');
const fmtR=(a,b)=>fmt(a)+' – '+fmt(b);

let age=0;

function mkTooth(t,lower){
  const st=status(t,age),s=sz(t.type);
  const w=document.createElement('div');
  w.className=`tooth ${lower?'lower':''} s-${st}`;
  const b=document.createElement('div');
  b.className='tooth-body';b.style.cssText=`width:${s.w}px;height:${s.h}px;`;
  const r=document.createElement('div');r.className='tooth-root';
  const n=document.createElement('div');n.className='tooth-num';n.textContent=t.id.replace(/[ul]/,'');
  if(lower){w.appendChild(n);w.appendChild(r);w.appendChild(b);}
  else{w.appendChild(b);w.appendChild(r);w.appendChild(n);}
  w.addEventListener('click',()=>openSheet(t,st));
  return w;
}

function mkJaw(id,teeth,lower){
  const c=document.getElementById(id);c.innerHTML='';
  const row=document.createElement('div');
  row.className=`jaw-row${lower?' lower':''}`;
  const sep=document.createElement('div');
  sep.style.cssText='width:3px;flex-shrink:0;background:linear-gradient(to bottom,rgba(255,255,255,0.18),rgba(255,255,255,0.06));border-radius:2px;margin:0 1px;align-self:stretch;min-height:28px;';
  teeth.forEach((t,i)=>{row.appendChild(mkTooth(t,lower));if(i===7)row.appendChild(sep);});
  c.appendChild(row);
}

function openSheet(t,st){
  const tm={incisor:'Резец',canine:'Клык',premolar:'Премоляр',molar:'Моляр',wisdom:'Зуб мудрости'};
  const babyStates=['erupting','baby','soon-fall','falling','fallen'];
  const displayName = (babyStates.includes(st) && t.babyName) ? t.babyName : t.name;
  document.getElementById('shN').textContent=displayName;
  document.getElementById('shT').textContent=tm[t.type]+' · '+(t.id[0]==='u'?'Верхняя':'Нижняя')+' челюсть';
  let r='';
  if(t.baby){
    const isBabyNow = babyStates.includes(st);
    const babyLabel = t.babyName || displayName;
    r+=`<div class="sh-row"><span class="sh-key">Прорезывание молочного</span><span class="sh-val">${fmtR(t.eruptMin,t.eruptMax)}</span></div>`;
    r+=`<div class="sh-row"><span class="sh-key">Выпадение молочного</span><span class="sh-val">${fmtR(t.shedMin,t.shedMax)}</span></div>`;
    r+=`<div class="sh-row"><span class="sh-key">Прорезывание постоянного</span><span class="sh-val">${fmtR(t.permMin,t.permMax)}</span></div>`;
  } else {
    r+=`<div class="sh-row"><span class="sh-key">Прорезывание</span><span class="sh-val">${fmtR(t.permMin,t.permMax)}</span></div>`;
  }
  document.getElementById('shR').innerHTML=r;
  const col=SC[st],bg=SB[st],el=document.getElementById('shS');
  el.textContent=SL[st];
  el.style.cssText=`background:${bg};color:${col};border:1px solid ${col}30;padding:11px 14px;border-radius:15px;font-size:14px;font-weight:800;text-align:center;`;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sbg').classList.add('open');
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sbg').classList.remove('open');
}

function toggleL(){document.getElementById('lpanel').classList.toggle('open');}
document.addEventListener('click',e=>{
  const lp=document.getElementById('lpanel'),lb=document.getElementById('lbtn');
  if(!lp.contains(e.target)&&!lb.contains(e.target))lp.classList.remove('open');
});

function ageText(m){
  if(m===0)return`0 <small>мес.</small>`;
  if(m<12)return`${m} <small>мес.</small>`;
  const y=Math.floor(m/12),mo=m%12;
  return `${y}г <small>${mo}м</small>`;
}

function phase(m){
  if(m<6) return{l:'Зубов нет',c:'#7dd3fc',b:'rgba(125,211,252,0.13)'};
  if(m<36)return{l:'Молочные растут',c:'#4ade80',b:'rgba(74,222,128,0.13)'};
  if(m<66)return{l:'Молочный прикус',c:'#86efac',b:'rgba(134,239,172,0.11)'};
  if(m<84)return{l:'Начало смены',c:'#fde68a',b:'rgba(253,230,138,0.13)'};
  if(m<144)return{l:'Смешанный прикус',c:'#fdba74',b:'rgba(253,186,116,0.13)'};
  if(m<180)return{l:'Постоянный растёт',c:'#93c5fd',b:'rgba(147,197,253,0.13)'};
  return{l:'Постоянный прикус',c:'#bfdbfe',b:'rgba(191,219,254,0.1)'};
}

function infoRow(m){
  const all=[...TU,...TL];
  const uniq=(arr)=>{const seen=new Set();return arr.filter(t=>{if(seen.has(t.name))return false;seen.add(t.name);return true;});};
  const erupting=uniq(all.filter(t=>status(t,m)==='erupting'));
  const falling=uniq(all.filter(t=>['falling','soon-fall'].includes(status(t,m))));
  const permN=uniq(all.filter(t=>status(t,m)==='perm-new'));
  const babyC=all.filter(t=>['baby','erupting','soon-fall','falling'].includes(status(t,m))).length;
  const permC=all.filter(t=>['permanent','perm-new'].includes(status(t,m))).length;
  const gaps=all.filter(t=>status(t,m)==='fallen').length;

  const card=(lbl,col,body)=>`<div class="icard gl" style="border-color:${col}25;">
    <div class="icard-lbl" style="color:${col};">${lbl}</div>
    <div class="icard-body">${body}</div></div>`;

  let h='';
  if(erupting.length)h+=card('🟢 Прорезываются','#4ade80',erupting.map(t=>`<div>${t.babyName||t.name}</div>`).join(''));
  if(falling.length) h+=card('🟠 Выпадают','#f97316',falling.map(t=>`<div>${t.babyName||t.name}</div>`).join(''));
  if(permN.length)   h+=card('🔵 Прорезываются постоянные','#60a5fa',permN.map(t=>`<div>${t.name}</div>`).join(''));
  h+=card('📊 Состав','#a5b4fc',`<div>🟢 Молочных: <b>${babyC}</b></div><div>🔵 Постоянных: <b>${permC}</b></div>${gaps?`<div>⬜ Промежутков: <b>${gaps}</b></div>`:''}`);
  document.getElementById('infoRow').innerHTML=h;
}

function update(){
  age=parseInt(document.getElementById('sl').value);
  document.getElementById('ageNum').innerHTML=ageText(age);
  const p=phase(age),pill=document.getElementById('pill');
  pill.textContent=p.l;pill.style.color=p.c;pill.style.background=p.b;pill.style.borderColor=p.c+'30';
  mkJaw('uJaw',TU,false);mkJaw('lJaw',TL,true);
  infoRow(age);
}

const sl=document.getElementById('sl');
sl.addEventListener('input',function(){
  const pct=(this.value/this.max)*100;
  this.style.background=`linear-gradient(to right,rgba(147,197,253,0.75) ${pct}%,rgba(255,255,255,0.12) ${pct}%)`;
  update();
});
sl.style.background=`linear-gradient(to right,rgba(147,197,253,0.75) 0%,rgba(255,255,255,0.12) 0%)`;
update();
</script>
</body>
